<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudoku Solver</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 50px;
        }
        table {
            border-collapse: collapse;
            border: 2px solid black;
        }
        td {
            padding: 0;
            border: 1px solid #ccc;
        }
        input {
            width: 40px;
            height: 40px;
            text-align: center;
            font-size: 20px;
            border: none;
            outline: none;
        }
        input:focus {
            background-color: #eef;
        }
        /* Thick borders for 3x3 blocks */
        tr:nth-child(3n) td {
            border-bottom: 2px solid black;
        }
        td:nth-child(3n) {
            border-right: 2px solid black;
        }
        tr:last-child td {
            border-bottom: 2px solid black;
        }
        td:last-child {
            border-right: 2px solid black;
        }
        .controls {
            margin-top: 20px;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
        #message {
            margin-top: 10px;
            color: red;
        }
    </style>
</head>
<body>
    <h1>Sudoku Solver</h1>
    <table id="sudoku-grid">
    </table>
    <div class="controls">
        <button onclick="solve()">Solve</button>
        <button onclick="clearGrid()">Clear</button>
    </div>
    <div id="message"></div>

    <script>
        const grid = document.getElementById('sudoku-grid');
        for (let r = 0; r < 9; r++) {
            const row = document.createElement('tr');
            for (let c = 0; c < 9; c++) {
                const cell = document.createElement('td');
                const input = document.createElement('input');
                input.type = 'number';
                input.min = 1;
                input.max = 9;
                input.id = `cell-${r}-${c}`;
                cell.appendChild(input);
                row.appendChild(cell);
            }
            grid.appendChild(row);
        }

        async function solve() {
            const board = [];
            for (let r = 0; r < 9; r++) {
                const row = [];
                for (let c = 0; c < 9; c++) {
                    const val = document.getElementById(`cell-${r}-${c}`).value;
                    row.push(val === "" ? 0 : parseInt(val));
                }
                board.push(row);
            }

            document.getElementById('message').innerText = "Solving...";

            try {
                const response = await fetch('/solve', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ board })
                });
                const data = await response.json();

                if (data.status === 'ok') {
                    document.getElementById('message').innerText = "";
                    for (let r = 0; r < 9; r++) {
                        for (let c = 0; c < 9; c++) {
                            document.getElementById(`cell-${r}-${c}`).value = data.solution[r][c];
                        }
                    }
                } else {
                    document.getElementById('message').innerText = data.error;
                }
            } catch (error) {
                document.getElementById('message').innerText = "Error connecting to server";
            }
        }

        function clearGrid() {
            for (let r = 0; r < 9; r++) {
                for (let c = 0; c < 9; c++) {
                    document.getElementById(`cell-${r}-${c}`).value = "";
                }
            }
            document.getElementById('message').innerText = "";
        }
    </script>
</body>
</html>
